{{ define "header" }}
  <header class="cdk-header">
    {{ partials.Include "site-navigation.html" . }}
  </header>
{{ end }}

{{ define "main" }}
  <section class="cdk-page">
    <article class="cdk-page__article">
      <div class="cdk-page__content">
        {{ .Content }}
        {{ if .Params.render_contact_points }}
          {{ partials.Include "cdk-contact.html" . }}
        {{ end }}
      </div>
    </article>
  </section>
{{ end }}
